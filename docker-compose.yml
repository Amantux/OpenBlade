services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OPENBLADE_BACKEND: simulator
      OPENBLADE_DB_PATH: /data/openblade.db
    volumes:
      - openblade-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  openblade-data:
