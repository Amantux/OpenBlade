name: operability

# Production-operability gate. Proves OpenBlade is deployable, its runtime
# topology is wired and responding, and its disaster-recovery restore path works —
# on every change to the code that affects those properties.
#
# BLOCKING steps (fail the check): config-validation unit tests, topology
# verification, restore verification, and the operability unit tests. These are
# deterministic and use NO production data or credentials.
# ADVISORY: none yet — everything here is deterministic enough to block on.

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: operability-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  operability-gate:
    name: operability-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e '.[dev]'

      - name: Operability unit tests (config validation, topology, DR)
        run: pytest tests/unit/test_config_validation.py tests/unit/test_topology.py tests/unit/test_dr.py -q --tb=short

      - name: Validate configuration (dev profile must be deployable)
        run: python scripts/validate_config.py

      - name: Reject an unsafe production profile (negative control)
        run: |
          if OPENBLADE_ENV=production python scripts/validate_config.py; then
            echo "::error::config validator PASSED an unsafe production profile — gate is broken"
            exit 1
          else
            echo "unsafe production profile correctly rejected"
          fi

      - name: Verify runtime topology (endpoints/consumers/services wired & responding)
        run: python scripts/verify_topology.py

      - name: Verify disaster-recovery restore path (isolated copy, never production data)
        run: python scripts/restore_verify.py
