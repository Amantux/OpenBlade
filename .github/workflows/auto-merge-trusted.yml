name: Auto-merge trusted PRs

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-trusted-pr:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Merge trusted PRs targeting master
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const allowedAuthors = new Set(["Amantux", "Copilot"]);
            const prs = context.payload.workflow_run.pull_requests || [];

            if (!prs.length) {
              core.info("No pull requests attached to this CI run.");
              return;
            }

            for (const prRef of prs) {
              const number = prRef.number;
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: number,
              });

              if (pr.base.ref !== "master") {
                core.info(`Skipping #${number}: base is ${pr.base.ref}, not master.`);
                continue;
              }
              if (pr.state !== "open") {
                core.info(`Skipping #${number}: PR is ${pr.state}.`);
                continue;
              }
              if (pr.draft) {
                core.info(`Skipping #${number}: PR is draft.`);
                continue;
              }
              if (!allowedAuthors.has(pr.user.login)) {
                core.info(`Skipping #${number}: author ${pr.user.login} is not trusted.`);
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: number,
                  merge_method: "squash",
                });
                core.info(`Merged trusted PR #${number}.`);
              } catch (error) {
                core.warning(`Unable to merge #${number}: ${error.message}`);
              }
            }
