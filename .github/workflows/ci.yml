name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      api: ${{ steps.filter.outputs.api }}
      simulator: ${{ steps.filter.outputs.simulator }}
      frontend: ${{ steps.filter.outputs.frontend }}
      cicd: ${{ steps.filter.outputs.cicd }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'openblade/**/*.py'
              - 'tests/unit/**'
              - 'tests/safety/**'
              - 'tests/integration/test_library_commands.py'
              - 'tests/integration/test_sharded_archive_restore.py'
              - 'tests/integration/test_sharded_archive_atomicity.py'
              - 'pyproject.toml'
            api:
              - 'openblade/api/**'
              - 'openblade/bootstrap.py'
              - 'openblade/config.py'
              - 'tests/integration/test_aml_*.py'
              - 'tests/integration/test_multi_library.py'
              - 'tests/integration/test_library_commands.py'
              - 'tests/integration/test_operability_alerts.py'
              - 'tests/unit/test_emulator_client_config.py'
              - 'deploy/emulator/observability/**'
              - 'tools/emulator_spec/**'
            simulator:
              - 'openblade/simulator/**'
              - 'openblade/emulator_contract/**'
              - 'tests/i3/**'
              - 'tests/integration/test_aml_emulator_latency*.py'
              - 'tests/integration/test_aml_scope_lockdown.py'
              - 'tests/integration/test_aml_library_spec_parity.py'
              - 'deploy/emulator/**'
              - 'scripts/emulator/**'
              - 'docker-compose.yml'
              - 'tools/emulator_spec/**'
            frontend:
              - 'frontend/**'
            cicd:
              - '.github/workflows/**'

  backend-lint:
    name: backend-lint
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.api == 'true' || needs.changes.outputs.simulator == 'true' }}
    runs-on: ubuntu-latest
    # Advisory: the repo carries a large pre-existing ruff/format backlog (~180
    # lint findings + ~160 files needing `ruff format`). This job still runs and
    # reports, but does not fail CI (so trusted-PR auto-merge can proceed). Not a
    # required check. Tracked for incremental cleanup; new code should still lint.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: ruff format --check .

  backend-typecheck:
    name: backend-typecheck
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.api == 'true' || needs.changes.outputs.simulator == 'true' }}
    runs-on: ubuntu-latest
    # Advisory: ~300 pre-existing mypy errors across the god-file modules. Fixing
    # them safely is a large, staged effort (some involve API param names that are
    # part of the wire contract). This job still runs and reports, but does not
    # fail CI. Not a required check. Tracked for incremental cleanup.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e '.[dev]'
      - run: mypy openblade

  backend-tests:
    name: backend-tests
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e '.[dev]'
      - run: pytest tests/unit -q --tb=short
      - run: pytest tests/integration/test_library_commands.py -q --tb=short
      # Sharded archive/restore durability (incl. the atomic-commit invariant) — these
      # integration suites were not run by any CI job before; wire them in so the
      # commit-atomicity guarantee is actually enforced.
      - run: pytest tests/integration/test_sharded_archive_restore.py tests/integration/test_sharded_archive_atomicity.py -q --tb=short
      # Whole safety suite (was only test_safety_regression.py) so the SAFETY_003
      # import guard is enforced and cannot silently rot again.
      - run: pytest tests/safety -q --tb=short

  api-aml-integration:
    name: api-aml-integration
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e '.[dev]'
      - run: >
          pytest
          tests/integration/test_aml_*.py
          tests/integration/test_multi_library.py
          tests/integration/test_library_commands.py
          tests/integration/test_operability_alerts.py
          tests/unit/test_emulator_client_config.py
          -q --tb=short

  i3-smoke:
    name: i3-smoke
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.simulator == 'true' || needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    env:
      I3_TIMING_PROFILE: instant
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e '.[dev]'
      - run: nohup uvicorn openblade.api.main:app --host 127.0.0.1 --port 8000 >/tmp/openblade-api.log 2>&1 &
      - run: |
          python - <<'PY'
          import time
          import urllib.request
          for _ in range(60):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=2) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit("API did not become healthy in time")
          PY
      - run: pytest tests/i3/test_01_auth.py tests/i3/test_02_inventory.py tests/i3/test_03_changer.py tests/i3/test_12_multi_library.py tests/i3/test_14_emulator_profile.py -q --tb=short

  frontend-build-test:
    name: frontend-build-test
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint -- --max-warnings=0
      - run: npm run test:routes
      - run: npm run build
      - run: npm run test -- --run

  cicd-workflow-validate:
    name: cicd-workflow-validate
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.cicd == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pyyaml
      - name: Validate workflow YAML syntax
        run: |
          python - <<'PY'
          import pathlib
          import yaml
          workflows = pathlib.Path(".github/workflows")
          for path in sorted(workflows.glob("*.yml")):
            with path.open("r", encoding="utf-8") as handle:
              yaml.safe_load(handle)
          print("Workflow YAML validation passed.")
          PY
