name: openblade-emulator-standalone

x-emulator-common: &emulator-common
  build:
    context: ../..
    dockerfile: deploy/emulator/Dockerfile.local
  image: ${OPENBLADE_EMULATOR_LOCAL_IMAGE:-openblade-i3-emulator-local:dev}
  pull_policy: never
  healthcheck:
    test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
    interval: 10s
    timeout: 5s
    retries: 5
  restart: unless-stopped

x-runtime-defaults: &runtime-defaults
  OPENBLADE_BACKEND: simulator
  OPENBLADE_DB_PATH: /data/openblade.db
  EMULATOR_PROFILE: ${EMULATOR_PROFILE:-scalar-i3-50-3}
  EMULATOR_SLOT_COUNT: ${EMULATOR_SLOT_COUNT:-50}
  EMULATOR_DRIVE_COUNT: ${EMULATOR_DRIVE_COUNT:-3}
  EMULATOR_OCCUPANCY_PERCENT: ${EMULATOR_OCCUPANCY_PERCENT:-60}
  EMULATOR_LATENCY_PROFILE: ${EMULATOR_LATENCY_PROFILE:-instant}
  OPENBLADE_SCALAR_API_ONLY: ${OPENBLADE_SCALAR_API_ONLY:-true}

x-ui-target-defaults: &ui-target-defaults
  EMULATOR_UI_TARGET_LIBRARY1_URL: ${EMULATOR_UI_TARGET_LIBRARY1_URL:-http://openblade-emulator-library-1:8010}
  EMULATOR_UI_TARGET_LIBRARY2_URL: ${EMULATOR_UI_TARGET_LIBRARY2_URL:-http://openblade-emulator-library-2:8010}
  EMULATOR_UI_TARGET_LIBRARY3_URL: ${EMULATOR_UI_TARGET_LIBRARY3_URL:-http://openblade-emulator-library-3:8010}

services:
  emulator-library-1:
    <<: *emulator-common
    container_name: openblade-emulator-library-1
    environment:
      <<: *runtime-defaults
      LIBRARY_ID: ${EMULATOR_LIBRARY1_ID:-1}
      LIBRARY_NAME: ${EMULATOR_LIBRARY1_NAME:-library-1}
    volumes:
      - emulator-library-1-data:/data
    ports:
      - "${EMULATOR_LIBRARY1_PORT:-8010}:8010"

  emulator-library-2:
    <<: *emulator-common
    container_name: openblade-emulator-library-2
    environment:
      <<: *runtime-defaults
      LIBRARY_ID: ${EMULATOR_LIBRARY2_ID:-2}
      LIBRARY_NAME: ${EMULATOR_LIBRARY2_NAME:-library-2}
    volumes:
      - emulator-library-2-data:/data
    ports:
      - "${EMULATOR_LIBRARY2_PORT:-8011}:8010"

  emulator-library-3:
    <<: *emulator-common
    container_name: openblade-emulator-library-3
    environment:
      <<: *runtime-defaults
      LIBRARY_ID: ${EMULATOR_LIBRARY3_ID:-3}
      LIBRARY_NAME: ${EMULATOR_LIBRARY3_NAME:-library-3}
    volumes:
      - emulator-library-3-data:/data
    ports:
      - "${EMULATOR_LIBRARY3_PORT:-8012}:8010"

  emulator-ui:
    image: nginx:1.27-alpine
    container_name: openblade-emulator-ui
    environment:
      <<: *ui-target-defaults
    depends_on:
      emulator-library-1:
        condition: service_healthy
      emulator-library-2:
        condition: service_healthy
      emulator-library-3:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${EMULATOR_UI_BIND_HOST:-0.0.0.0}:${EMULATOR_UI_PORT:-5174}:8080"
    volumes:
      - ./ui/index.html:/usr/share/nginx/html/index.html:ro
      - ./ui/styles.css:/usr/share/nginx/html/styles.css:ro
      - ./ui/app.js:/usr/share/nginx/html/app.js:ro
      - ./ui/nginx.conf:/etc/nginx/templates/default.conf.template:ro

volumes:
  emulator-library-1-data:
  emulator-library-2-data:
  emulator-library-3-data:
