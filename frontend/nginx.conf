server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream resolves lazily at request time
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:8000;

    # Proxy all AML API calls to the backend
    location /aml/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Root API prefix — forward to backend (strip /api, keep path)
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # React SPA — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
